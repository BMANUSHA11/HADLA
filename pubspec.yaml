name: local_helper

description: A local worker booking app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

  # Maps & Location
  google_maps_flutter: ^2.12.1
  geolocator: ^14.0.0

  # Open WhatsApp & Calls
  url_launcher: ^6.3.1

  # State Management
  provider: ^6.1.5

  # Icons
  font_awesome_flutter: ^10.8.0

  # UI
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true